<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up E-Wallet - TOKON</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Top Up E-Wallet</h1>
<p>DANA • GoPay • OVO • ShopeePay</p>
</header>

<div class="container">

<div class="card">

<h3>Pilih E-Wallet</h3>

<select id="wallet" style="width:100%;padding:10px;margin:10px 0;">
<option>DANA</option>
<option>GoPay</option>
<option>OVO</option>
<option>ShopeePay</option>
</select>

<h3>Nomor Tujuan</h3>

<input
type="text"
id="nomor"
placeholder="08xxxxxxxxxx"
style="width:100%;padding:10px;margin:10px 0;">

<h3>Nominal</h3>

<select id="nominal" style="width:100%;padding:10px;">
<option>Rp10.000</option>
<option>Rp20.000</option>
<option>Rp50.000</option>
<option>Rp100.000</option>
<option>Rp200.000</option>
<option>Rp500.000</option>
</select>

<br><br>

<button onclick="topupWallet()" style="width:100%;padding:12px;background:#1565C0;color:white;border:none;border-radius:8px;">
Top Up
</button>

</div>

</div>

<script>
function topupWallet(){

let wallet=document.getElementById("wallet").value;
let nomor=document.getElementById("nomor").value;
let nominal=document.getElementById("nominal").value;

if(nomor==""){
alert("Masukkan nomor tujuan.");
return;
}

alert(
"Pesanan berhasil dibuat!\n\n"+
"E-Wallet : "+wallet+
"\nNomor : "+nomor+
"\nNominal : "+nominal
);

}
</script>

</body>
</html>
