<!DOCTYPE html>
<html lang='id'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>TOKON - PPOB Digital</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb}
header{background:#0d6efd;color:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:28px;font-weight:bold}
.search{padding:10px;width:45%;border:none;border-radius:8px}
.login{color:#fff;text-decoration:none;background:#0056d6;padding:10px 15px;border-radius:8px}
.banner{margin:20px;background:linear-gradient(90deg,#0d47a1,#1565c0);color:#fff;padding:40px;border-radius:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;padding:20px}
.card{background:#fff;border-radius:12px;padding:20px;text-align:center;text-decoration:none;color:#222;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card i{font-size:36px;color:#0d6efd;margin-bottom:10px}
.games{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.game{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
footer{background:#111;color:#fff;text-align:center;padding:20px;margin-top:30px}
</style>
</head>
<body>
<header>
<div class="logo">TOKON</div>
<input class="search" placeholder="Cari produk atau layanan...">
<a class="login" href="login.html"><i class="fa fa-user"></i> Login</a>
</header>
<div class="banner">
<h1>Top Up Cepat, Aman & Terpercaya</h1>
<p>Pulsa, Paket Data, Token PLN, Top Up Game, dan E-Wallet.</p>
</div>
<section class="grid">
<a class="card" href="pulsa.html"><i class="fa fa-mobile-screen"></i><br>Pulsa</a>
<a class="card" href="paket-data.html"><i class="fa fa-globe"></i><br>Paket Data</a>
<a class="card" href="pln.html"><i class="fa fa-bolt"></i><br>Token PLN</a>
<a class="card" href="topup-game.html"><i class="fa fa-gamepad"></i><br>Top Up Game</a>
<a class="card" href="ewallet.html"><i class="fa fa-wallet"></i><br>E-Wallet</a>
<a class="card" href="riwayat.html"><i class="fa fa-clock-rotate-left"></i><br>Riwayat</a>
</section>
<section class="games">
<div class="game"><h3>Mobile Legends</h3><p>Diamond</p></div>
<div class="game"><h3>Free Fire</h3><p>Diamond</p></div>
<div class="game"><h3>PUBG Mobile</h3><p>UC</p></div>
<div class="game"><h3>Valorant</h3><p>Points</p></div>
</section>
<footer>© 2026 TOKON - PPOB Digital</footer>
</body></html>
